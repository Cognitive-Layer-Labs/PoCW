services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "8001:3000"
    environment:
      - REDIS_ARGS=--maxmemory 1536mb --maxmemory-policy noeviction --appendonly yes --auto-aof-rewrite-min-size 64mb --auto-aof-rewrite-percentage 100 --save 300 10
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - falkor_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  oracle:
    build: ./oracle-service
    ports:
      - "3000:3000"
    depends_on:
      falkordb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ORACLE_PRIVATE_KEY=${ORACLE_PRIVATE_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - ./oracle-service/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  falkor_data:
  redis_data:
