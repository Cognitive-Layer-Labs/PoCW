services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "8001:3000"
    environment:
      - REDIS_ARGS=--maxmemory 1536mb --maxmemory-policy noeviction --appendonly yes --auto-aof-rewrite-min-size 64mb --auto-aof-rewrite-percentage 100 --save 300 10
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - falkor_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  falkor_data:
