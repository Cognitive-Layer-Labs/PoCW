services:
  falkordb:
    image: falkordb/falkordb:latest
    environment:
      - REDIS_ARGS=--maxmemory 1536mb --maxmemory-policy noeviction --appendonly yes --auto-aof-rewrite-min-size 64mb --auto-aof-rewrite-percentage 100 --save 300 10
    restart: unless-stopped
    volumes:
      - falkor_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pocw_internal

  redis:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pocw_internal

  predictor:
    build:
      context: ./predictor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pocw_internal

  oracle:
    build:
      context: ./oracle-service
    restart: unless-stopped
    depends_on:
      falkordb:
        condition: service_healthy
      redis:
        condition: service_healthy
      predictor:
        condition: service_healthy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ORACLE_PRIVATE_KEY=${ORACLE_PRIVATE_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - POCW_API_KEY=${POCW_API_KEY}
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_GRAPH=${FALKORDB_GRAPH:-pocw}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - PORT=3000
      - PREDICTOR_URL=http://predictor:3001
    volumes:
      - oracle_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pocw_internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    environment:
      - ORACLE_DOMAIN=${ORACLE_DOMAIN}
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - pocw_internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  falkor_data:
  redis_data:
  oracle_data:
  certbot_www:
  certbot_certs:

networks:
  pocw_internal:
    driver: bridge
